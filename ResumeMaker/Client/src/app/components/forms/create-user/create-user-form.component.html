<form class="form" [formGroup]="createUserForm" (ngSubmit)="onSubmit()">
  <h4 class="form-title">Create user</h4>
  <div class="form-item">
    <label class="form-label" for="email">Email</label>
    <input class="form-input-text" id="email" type="text" formControlName="email" />
  </div>
  <div class="form-item">
    <label class="form-label" for="firstName">First name</label>
    <input class="form-input-text" id="firstName" type="text" formControlName="firstName" />
  </div>
  <div class="form-item">
    <label class="form-label" for="lastName">Last name</label>
    <input class="form-input-text" id="lastName" type="text" formControlName="lastName" />
  </div>
  <div class="form-item">
    <label class="form-label" for="city">City</label>
    <input class="form-input-text" id="city" type="text" formControlName="city" />
  </div>
  <div class="form-item">
    <label class="form-label" for="country">Country</label>
    <input class="form-input-text" id="country" type="text" formControlName="country" />
  </div>
  <div class="form-item">
    <label class="form-label" for="phoneNumber">Phone number</label>
    <input class="form-input-text" id="phoneNumber" type="text" formControlName="phoneNumber" />
  </div>
  <button type="submit">Create</button>
</form>
