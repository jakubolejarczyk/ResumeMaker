<div class="view">
  <form class="resume-form" [formGroup]="resumeForm" (ngSubmit)="onSubmit()">
    <h3 class="resume-form-header">Create resume</h3>
    <div class="resume-form-item">
      <label class="resume-form-form-label" for="name">Name</label>
      <input id="name" class="resume-form-input-text" type="text" formControlName="name" />
    </div>
    <div class="resume-form-item">
      <label class="resume-form-form-label" for="jobTitle">Job title</label>
      <input id="jobTitle" class="resume-form-input-text" type="text" formControlName="jobTitle" />
    </div>
    <div class="resume-form-item">
      <label class="resume-form-form-label" for="description">Description</label>
      <input id="description" class="resume-form-input-text" type="text" formControlName="description" />
    </div>
    <div class="resume-form-item resume-form-array" formArrayName="socialMedias">
      @for (control of getSocialMedias().controls; track control; let i = $index) {
      <div [formGroupName]="i">
        <input type="text" placeholder="Label" formControlName="label">
        <input type="text" placeholder="Link" formControlName="link">
        <button type="button" (click)="moveSocialMediaUp(i)" [disabled]="i === 0">Up</button>
        <button type="button" (click)="moveSodialMediaDown(i)" [disabled]="i === getSocialMedias().length - 1">Down</button>
        <button type="button" (click)="removeSocialMedia(i)">Delete</button>
      </div>
      }
      <button type="button" (click)="addSocialMedia()">Add</button>
    </div>
    <input type="submit" [disabled]="!resumeForm.valid" value="Create" />
  </form>
</div>
